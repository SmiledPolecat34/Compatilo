services:
  db:
    image: postgres:16-alpine
    container_name: compatilo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: compatilo
      POSTGRES_PASSWORD: compatilo_dev
      POSTGRES_DB: compatilo
    ports:
      - "5432:5432"
    volumes:
      - compatilo_pgdata:/var/lib/postgresql/data

volumes:
  compatilo_pgdata:
