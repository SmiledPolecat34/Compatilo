# Déploiement du backend Compatilo sur Render
services:
  - type: web
    name: compatilo-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace=apps/api
    startCommand: npm run db:deploy --workspace=apps/api && npm run start --workspace=apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: compatilo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PIN_PEPPER
        generateValue: true
      - key: WEB_ORIGIN
        sync: false # ex. https://compatilo.netlify.app
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: compatilo-db
    plan: free
